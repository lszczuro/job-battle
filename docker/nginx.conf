# Rate limiting: 6 req/min per IP for the AI endpoint (bursts up to 2)
limit_req_zone $binary_remote_addr zone=copilotkit:10m rate=6r/m;

server {
    server_name jobbattle.pixelnest.pl;

    # Limit request body size (prevents huge prompt injections)
    client_max_body_size 64k;

    location /api/copilotkit {
        limit_req zone=copilotkit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jobbattle.pixelnest.pl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jobbattle.pixelnest.pl/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = jobbattle.pixelnest.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name jobbattle.pixelnest.pl;
    return 404; # managed by Certbot

}
