# Rate limiting: 6 req/min per IP for the AI endpoint (bursts up to 2)
limit_req_zone $binary_remote_addr zone=copilotkit:10m rate=6r/m;

server {
    listen 80;
    server_name jobbattle.pixelnest.pl;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name jobbattle.pixelnest.pl;

    ssl_certificate /etc/letsencrypt/live/jobbattle.pixelnest.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobbattle.pixelnest.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Limit request body size (prevents huge prompt injections)
    client_max_body_size 64k;

    location /api/copilotkit {
        limit_req zone=copilotkit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support (CopilotKit streaming)
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support (CopilotKit streaming)
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
